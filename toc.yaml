navigation:
  - title: Using didnotreadit
    icon: book
    items:
      - title: Overview
        page: pages/usage/overview.md
      - title: Accounts
        page: pages/usage/accounts.md
      - title: Browsing and Voting
        page: pages/usage/browsing.md
      - title: Creating a didnotreadit
        page: pages/usage/didnotreadits.md
      - title: Submitting Posts
        page: pages/usage/posts.md
      - title: Comments
        page: pages/usage/comments.md
      - title: Search
        page: pages/usage/search.md

  - title: Installation
    icon: rocket
    items:
      - title: Requirements
        page: pages/installation/requirements.md
        visible_when:
          entitlements:
            - isEmbeddedClusterDownloadEnabled
      - title: Release History
        page: pages/installation/release-history.md
      - title: Linux
        page: pages/installation/linux.md
        visible_when:
          entitlements:
            - isEmbeddedClusterDownloadEnabled
      - title: Helm
        page: pages/installation/helm.md
        visible_when:
          entitlements:
            - isHelmInstallEnabled

  - title: Infrastructure
    icon: database
    items:
      - title: Terraform Module
        terraform_module: github.com/ivolgin-lab/did-not-read-it-terraform?ref=main
        visible_when:
          entitlements:
            - isTerraformEnabled

  - title: Operations
    icon: wrench
    items:
      - title: Security
        page: pages/operations/security.md
        visible_when:
          permissions:
            - canViewSecurity
      - title: Linux Bundles
        page: pages/operations/bundles/linux.md
        visible_when:
          entitlements:
            - isEmbeddedClusterDownloadEnabled
      - title: Helm Bundles
        page: pages/operations/bundles/helm.md
        visible_when:
          entitlements:
            - isHelmInstallEnabled
      - title: Upload Bundles
        page: pages/operations/bundles/uploaded.md

  - title: Updates
    icon: refresh-cw
    items:
      - title: Checking for Updates
        page: pages/updates/checking.md

  - title: Support
    icon: life-buoy
    items:
      - title: FAQ
        page: pages/support/faq.md
      - title: Contact Support
        page: pages/support/contact.md

  - title: Reference
    icon: book
    items:
      - title: Helm Chart
        helm_chart:
          name: didnotreadit
        visible_when:
          entitlements:
            - isHelmInstallEnabled

overrides:
  home: pages/home.md
